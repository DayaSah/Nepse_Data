name: Whole Database Sync

on:
  workflow_dispatch: # This enables the manual "Run workflow" button

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 120 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pymongo requests dnspython

      - name: Run Market Scraper
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python Utility/All_Scraper.py

      - name: Notify on Failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ Manual GitHub Action 'Whole Database Sync' failed. Check logs!"
