name: Weekly Ghost Fetcher

on:
  schedule:
    # Runs at 00:00 UTC every Saturday (around 5:45 AM Nepal time)
    - cron: '0 0 * * 6' 
  workflow_dispatch: # Allows you to click a "Run Now" button manually

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Random Time Delay (Stealth)
        # Sleeps for a random time between 1 second and 12 hours
        run: sleep $((RANDOM % 43200))

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install playwright pymongo
          playwright install --with-deps chromium

      - name: Run Auto Fetcher
        # Passes your secret database password safely into the script
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python auto_fetcher.py
