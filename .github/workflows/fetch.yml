name: Weekly Ghost Fetcher

on:
  schedule:
    # Runs at 00:00 UTC every Saturday (around 5:45 AM Nepal time)
    - cron: '0 0 * * 6' 
  workflow_dispatch: # Allows you to click a "Run Now" button manually

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ⚠️ RANDOM TIME DELAY TEMPORARILY REMOVED FOR LIVE TESTING ⚠️
      # (Add it back later to prevent weekend IP bans)

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth pymongo pandas
          playwright install --with-deps chromium

      - name: Run Auto Fetcher
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python auto_fetcher.py
