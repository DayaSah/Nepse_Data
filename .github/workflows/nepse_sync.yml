name: NEPSE Cloud Data Sync

# Triggers: Run manually from the GitHub UI, OR schedule it daily
on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '15 11 * * *' # Runs daily at 11:15 AM UTC (Approx 5:00 PM Nepal Time)

jobs:
  sync_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pymongo requests

      - name: Run Headless Fetcher
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python Utilities/Whole_Stock_Chukul.py
